<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="page-title">Academic CV</title>
    <meta name="description" content="Personal academic CV and research portfolio." />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <button
      class="theme-toggle floating-theme-toggle"
      id="theme-toggle"
      type="button"
      aria-label="Toggle dark mode"
    >
      🌙 Dark mode
    </button>

    <a class="skip-link" href="#main">Skip to content</a>

    <div class="page">
      <aside class="sidebar" aria-label="Profile summary">
        <div class="profile-card">
          <img
            class="avatar"
            src="media/git_pic.jpg"
            alt="Photo of Siddharth Chaturvedi"
          />

          <h1 id="name">Your Name</h1>
          <p class="role" id="role">Your role</p>

          <div
            class="tags profile-keywords"
            id="keywords"
            aria-label="Research keywords"
          ></div>

          <p class="location" id="location"></p>
          <p class="summary" id="summary"></p>

          <div
            class="profile-icons"
            id="links"
            aria-label="Profile and contact links"
          ></div>
        </div>
      </aside>

      <main id="main" class="content">
        <nav class="top-nav" aria-label="Page sections">
          <a href="#about">About</a>
          <a href="#research-interests">Research Interests</a>
          <a href="#publications">Publications</a>
          <a href="#talks">Talks</a>
          <a href="#software">Software</a>
          <a href="#education">Education</a>
          <a href="#service">Service</a>
        </nav>

        <section id="about" class="section">
          <h2>About</h2>
          <p id="about-text"></p>
        </section>

        <section id="research-interests" class="section">
          <h2>Research Interests</h2>
          <div
            class="cards research-cards"
            id="research-interests-list"
          ></div>
        </section>

        <section id="publications" class="section">
          <h2>Publications</h2>
          <div class="timeline" id="publications-list"></div>
        </section>

        <section id="talks" class="section">
          <h2>Talks, tutorials & workshops</h2>
          <div class="timeline" id="talks-list"></div>
        </section>

        <section id="software" class="section">
          <h2>Software</h2>
          <div class="cards" id="software-list"></div>
        </section>

        <section id="education" class="section">
          <h2>Education</h2>
          <div class="timeline" id="education-list"></div>
        </section>

        <section id="service" class="section">
          <h2>Service & community</h2>
          <div class="timeline" id="service-list"></div>
        </section>

        <footer class="footer">
          <span id="footer-name">Your Name</span>
          <span>·</span>
          <button
            type="button"
            class="print-button"
            onclick="window.print()"
          >
            Print / save as PDF
          </button>
        </footer>
      </main>
    </div>

    <script src="cv-data.js"></script>

    <script>
      const data = window.CV_DATA || {};
      const byId = (id) => document.getElementById(id);

      function setText(id, value) {
        const element = byId(id);
        if (!element) return;
        element.textContent = value || "";
      }

      function hideIfEmpty(sectionId, value) {
        const element = byId(sectionId);
        if (!element) return;

        const empty =
          !value ||
          (Array.isArray(value) && value.length === 0);

        if (empty) {
          element.hidden = true;
        }
      }

      function link(label, url) {
        if (!url || url === "#") return "";

        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.textContent = label;

        if (!url.startsWith("mailto:") && !url.startsWith("#")) {
          anchor.target = "_blank";
          anchor.rel = "noreferrer";
        }

        return anchor;
      }

      function linkKind(label, url) {
        const text = `${label || ""} ${url || ""}`.toLowerCase();

        if (text.includes("email") || text.includes("mailto:")) return "email";
        if (text.includes("github")) return "github";
        if (text.includes("scholar")) return "scholar";
        if (text.includes("linkedin")) return "linkedin";
        if (text.includes("bluesky") || text.includes("bsky")) return "bluesky";
        if (text.includes("twitter") || text.includes("x.com") || label === "X") return "x";
        if (text.includes("cv") || text.includes("pdf")) return "cv";

        return "external";
      }

      function emailFromUrl(url) {
        if (!url || !url.startsWith("mailto:")) return "";
        return url.replace("mailto:", "").split("?")[0];
      }

      function iconMarkup(kind) {
        if (kind === "email") {
          return `
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3.75 5.5h16.5c.69 0 1.25.56 1.25 1.25v10.5c0 .69-.56 1.25-1.25 1.25H3.75c-.69 0-1.25-.56-1.25-1.25V6.75c0-.69.56-1.25 1.25-1.25Zm.9 2.35v8.3h14.7v-8.3l-6.65 5.16a1.12 1.12 0 0 1-1.4 0L4.65 7.85Zm1.2-.85L12 11.76 18.15 7H5.85Z"/>
            </svg>
          `;
        }

        if (kind === "github") {
          return `
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 .75A11.25 11.25 0 0 0 8.44 22.67c.56.1.77-.24.77-.54v-1.9c-3.14.68-3.8-1.35-3.8-1.35-.51-1.3-1.25-1.65-1.25-1.65-1.02-.7.08-.69.08-.69 1.13.08 1.72 1.16 1.72 1.16 1 .1 1.57 1.52 3.22 1.08.1-.73.39-1.23.71-1.51-2.5-.29-5.14-1.25-5.14-5.57 0-1.23.44-2.23 1.16-3.02-.12-.28-.5-1.43.11-2.98 0 0 .95-.3 3.1 1.15a10.7 10.7 0 0 1 5.64 0c2.15-1.45 3.1-1.15 3.1-1.15.61 1.55.23 2.7.11 2.98.72.79 1.16 1.79 1.16 3.02 0 4.33-2.64 5.28-5.15 5.56.4.35.76 1.04.76 2.1v3.12c0 .3.2.65.78.54A11.25 11.25 0 0 0 12 .75Z"/>
            </svg>
          `;
        }

        if (kind === "linkedin") return "in";
        if (kind === "scholar") return "🎓";
        if (kind === "bluesky") return "🦋";
        if (kind === "x") return "𝕏";
        if (kind === "cv") return "CV";

        return "↗";
      }

      function renderLinks() {
        const container = byId("links");
        const links = data.links || [];
        if (!container) return;

        container.innerHTML = "";

        links.forEach((item) => {
          if (!item.url || item.url === "#") return;

          const anchor = link(item.label, item.url);
          if (!anchor) return;

          const kind = linkKind(item.label, item.url);
          const email = emailFromUrl(item.url);
          const title = kind === "email" && email ? email : item.label;

          anchor.className = `profile-icon-link ${kind}-icon`;
          anchor.title = title;
          anchor.setAttribute("aria-label", title);

          const icon = document.createElement("span");
          icon.className = "profile-icon-symbol";
          icon.setAttribute("aria-hidden", "true");
          icon.innerHTML = iconMarkup(kind);

          const screenReaderLabel = document.createElement("span");
          screenReaderLabel.className = "sr-only";
          screenReaderLabel.textContent = title;

          anchor.textContent = "";
          anchor.appendChild(icon);
          anchor.appendChild(screenReaderLabel);

          container.appendChild(anchor);
        });
      }

      function renderTags(id, items) {
        const container = byId(id);
        if (!container) return;

        container.innerHTML = "";

        (items || []).forEach((item) => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = item;
          container.appendChild(span);
        });
      }

      function renderCards(id, items) {
        const container = byId(id);
        if (!container) return;

        container.innerHTML = "";

        (items || []).forEach((item) => {
          const article = document.createElement("article");
          article.className = "card";

          if (item.image) {
            const image = document.createElement("img");
            image.className = "card-image";
            image.src = item.image;
            image.alt = item.imageAlt || item.name || item.title || "";
            article.appendChild(image);
          }

          const title = document.createElement("h3");
          title.textContent = item.name || item.title || "Untitled";
          article.appendChild(title);

          if (item.meta) {
            const meta = document.createElement("p");
            meta.className = "meta";
            meta.textContent = item.meta;
            article.appendChild(meta);
          }

          if (item.description) {
            const description = document.createElement("p");
            description.textContent = item.description;
            article.appendChild(description);
          }

          if (item.tags && item.tags.length) {
            const tags = document.createElement("div");
            tags.className = "mini-tags";

            item.tags.forEach((tag) => {
              const span = document.createElement("span");
              span.textContent = tag;
              tags.appendChild(span);
            });

            article.appendChild(tags);
          }

          if (item.link) {
            const anchor = link(item.linkLabel || "Link", item.link);

            if (anchor) {
              anchor.className = "text-link";
              article.appendChild(anchor);
            }
          }

          container.appendChild(article);
        });
      }

      function renderTimeline(id, items) {
        const container = byId(id);
        if (!container) return;

        container.innerHTML = "";

        (items || []).forEach((item) => {
          const article = document.createElement("article");
          article.className = "timeline-item";

          const year = document.createElement("div");
          year.className = "year";
          year.textContent = item.year || "";
          article.appendChild(year);

          const body = document.createElement("div");
          body.className = "timeline-body";

          const title = document.createElement("h3");
          title.textContent = item.title || item.name || "Untitled";
          body.appendChild(title);

          if (item.authors) {
            const authors = document.createElement("p");
            authors.className = "authors meta";
            authors.textContent = item.authors;
            body.appendChild(authors);
          }

          if (item.venue || item.meta) {
            const meta = document.createElement("p");
            meta.className = "meta";
            meta.textContent = item.venue || item.meta;
            body.appendChild(meta);
          }

          if (item.description) {
            const description = document.createElement("p");
            description.textContent = item.description;
            body.appendChild(description);
          }

          if (item.link) {
            const anchor = link(item.linkLabel || "Link", item.link);

            if (anchor) {
              anchor.className = "text-link";
              article.appendChild(body);
              body.appendChild(anchor);
            }
          }

          if (!article.contains(body)) {
            article.appendChild(body);
          }

          container.appendChild(article);
        });
      }

      function init() {
        document.title = data.name ? `${data.name} — CV` : "Academic CV";

        setText("name", data.name);
        setText("role", data.role);
        setText("location", data.location);
        setText("summary", data.shortSummary);
        setText("footer-name", data.name);
        const aboutText = byId("about-text");
        if (aboutText) {
            aboutText.innerHTML = data.about || "";
        }

        renderLinks();
        renderTags("keywords", data.keywords);
        renderCards("research-interests-list", data.researchInterests || []);
        renderTimeline("publications-list", data.publications);
        renderTimeline("talks-list", data.talks);
        renderCards("software-list", data.software);
        renderTimeline("education-list", data.education);
        renderTimeline("service-list", data.service);

        hideIfEmpty("about", data.about);
        hideIfEmpty("research-interests", data.researchInterests);
        hideIfEmpty("publications", data.publications);
        hideIfEmpty("talks", data.talks);
        hideIfEmpty("software", data.software);
        hideIfEmpty("education", data.education);
        hideIfEmpty("service", data.service);
      }

      init();
    </script>

    <script>
      const themeToggle = document.getElementById("theme-toggle");

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);

        if (themeToggle) {
          themeToggle.textContent = theme === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
          themeToggle.setAttribute(
            "aria-label",
            theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
          );
        }
      }

      const savedTheme = localStorage.getItem("theme");
      const prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      applyTheme(savedTheme || (prefersDark ? "dark" : "light"));

      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme") || "light";

          applyTheme(currentTheme === "dark" ? "light" : "dark");
        });
      }
    </script>
  </body>
</html>
